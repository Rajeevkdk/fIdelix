services:
  db:
    image: postgres:16
    container_name: fidelix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fidelix
      POSTGRES_USER: fidelix
      POSTGRES_PASSWORD: fidelix_pass
      PGTZ: Asia/Kathmandu
    ports:
      - "5432:5432"
    volumes:
      - fidelix_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: fidelix-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fidelixglobal.com
      PGADMIN_DEFAULT_PASSWORD: admin_pass
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  fidelix_pgdata:
