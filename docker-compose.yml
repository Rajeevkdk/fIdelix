services:
  db:
    image: postgres:16
    container_name: fidelix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fidelix
      POSTGRES_USER: fidelix
      POSTGRES_PASSWORD: fidelix_pass
      PGTZ: Asia/Kathmandu
    ports:
      - "5432:5432"
    volumes:
      - fidelix_pgdata:/var/lib/postgresql/data

    backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      container_name: fidelix-backend
      restart: unless-stopped
    depends_on:
      - db
  environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fidelix
      SPRING_DATASOURCE_USERNAME: fidelix
      SPRING_DATASOURCE_PASSWORD: fidelix_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_PORT: 8080
  ports:
      - "8080:8080"
  depends_on:
      - db

volumes:
fidelix_pgdata: